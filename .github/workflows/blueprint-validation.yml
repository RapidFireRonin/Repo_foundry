name: Blueprint Validation

on:
  pull_request:
    paths:
      - "blueprints/**"
      - "registry/**"
      - "repo_foundry/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m repo_foundry.blueprints validate blueprints/example-repo.yaml
      - run: python -m repo_foundry.reconcile plan blueprints/example-repo.yaml --registry registry/repos.yaml --json > reconcile-plan.json
      - uses: actions/upload-artifact@v4
        with:
          name: reconcile-plan
          path: reconcile-plan.json

