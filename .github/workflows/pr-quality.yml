name: PR Quality Checks

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check visibility policy
        run: |
          echo "Autonomous work must remain logged, summarized, and visible." >> "$GITHUB_STEP_SUMMARY"
          test "${{ github.event_name }}" = "pull_request"
