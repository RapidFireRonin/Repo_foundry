name: Reconcile Dry Run

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m repo_foundry.reconcile plan blueprints/example-repo.yaml --registry registry/repos.yaml --json > artifacts-reconcile-plan.json
      - run: |
          echo "## Repo Foundry dry run" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts-reconcile-plan.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: reconcile-dry-run
          path: artifacts-reconcile-plan.json

