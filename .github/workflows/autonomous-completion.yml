name: Autonomous Completion Loop

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  report:
    name: Report completion candidates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run report-only completion sweep
        env:
          SWEEPER_EXECUTE: "false"
        run: python scripts/autonomous_completion.py
