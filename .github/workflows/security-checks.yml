name: Security Checks

on:
  pull_request:
  schedule:
    - cron: "43 3 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Scan for committed GitHub token assignments
        run: |
          set -euo pipefail
          # Keep this lightweight guard from matching its own workflow command or documentation examples.
          # It only fails on plausible committed assignments with a non-placeholder value.
          if grep -RInE '^[[:space:]]*(export[[:space:]]+)?(REPO_FOUNDRY_GH_TOKEN|GH_TOKEN|GITHUB_TOKEN)[[:space:]]*=[[:space:]]*(ghp_|github_pat_|gho_|ghu_|ghs_|ghr_|[A-Za-z0-9_]{30,})' . \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude='security-checks.yml'; then
            echo "Potential committed GitHub token found"
            exit 1
          fi
