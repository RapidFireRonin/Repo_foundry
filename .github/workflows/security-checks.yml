name: Security Checks

on:
  pull_request:
  schedule:
    - cron: "43 3 * * *"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect dependency manifest changes
        id: dep_changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"

          changed_files="$(git diff --name-only "$base" "$head")"
          echo "$changed_files"

          if echo "$changed_files" | grep -E '(^|/)(package.json|package-lock.json|pnpm-lock.yaml|yarn.lock|requirements.txt|pyproject.toml|poetry.lock|Pipfile|Pipfile.lock)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dependency Review
        if: steps.dep_changes.outputs.changed == 'true'
        uses: actions/dependency-review-action@v4

      - name: Skip dependency review
        if: steps.dep_changes.outputs.changed != 'true'
        run: echo "No dependency manifest or lockfile changed; dependency review skipped."

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Scan for committed GitHub token assignments
        run: |
          set -euo pipefail
          # Keep this lightweight guard from matching its own workflow command or documentation examples.
          # GitHub tokens use recognizable prefixes; placeholder-like long strings are not enough to fail CI.
          if grep -RInE '^[[:space:]]*(export[[:space:]]+)?(REPO_FOUNDRY_GH_TOKEN|GH_TOKEN|GITHUB_TOKEN)[[:space:]]*=[[:space:]]*(ghp_|github_pat_|gho_|ghu_|ghs_|ghr_)' . \
            --exclude-dir=.git \
            --exclude-dir=.venv \
            --exclude='security-checks.yml'; then
            echo "Potential committed GitHub token found"
            exit 1
          fi
