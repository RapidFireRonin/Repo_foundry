name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: cd dashboard/frontend && pnpm install --frozen-lockfile && pnpm run build
