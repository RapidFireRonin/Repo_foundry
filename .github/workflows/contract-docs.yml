name: Contract Docs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run contract documentation tests
        run: python -m pytest tests/test_contract_docs.py
